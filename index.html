<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijak Matematik</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Bijak Matematik - GeniuskidsEdu</h1>
            <p>Mari belajar matematik dengan cara yang menyeronokkan!</p>
        </header>

        <!-- Menu Utama -->
<div id="mainMenu" class="menu-screen">
  <div class="menu-container">
    <h2>Pilih Permainan</h2>
    <div class="menu-buttons">
      <button class="menu-btn" onclick="startDifficultySelection('kenaliNombor')">
        <span class="icon">🔢</span>
        <span>Kenali Nombor</span>
      </button>
      <!-- Tambah permainan lain di sini -->
    </div>
  </div>
</div>

<!-- Pilih Tahap Kesukaran -->
<div id="difficultySelection" class="hidden">
  <h2>Pilih Tahap Kesukaran</h2>
  <div class="menu-buttons">
    <button class="menu-btn" onclick="startGame('kenaliNombor','beginner')">
      Bijak Matematik 1 (Beginner)
    </button>
    <button class="menu-btn" onclick="startGame('kenaliNombor','intermediate')">
      Bijak Matematik 2 (Intermediate)
    </button>
    <button class="menu-btn" onclick="startGame('kenaliNombor','advanced')">
      Bijak Matematik 3&4 (Advanced)
    </button>
  </div>
  <button class="back-btn" onclick="backToMenu()">← Balik</button>
</div>

<!-- Kenali Nombor Game -->
<div id="kenaliNomborGame" class="game-screen hidden">
  <div class="game-header">
    <button class="back-btn" onclick="backToMenu()">← Balik</button>
    <h2>Permainan Kenali Nombor</h2>
    <div class="score">Skor: <span id="kenaliNomborScore">0</span>/10</div>
  </div>
  <div class="game-content">
    <div class="progress-bar">
      <div id="kenaliNomborProgress" class="progress-fill"></div>
    </div>
    <div class="question-counter">
      Soalan <span id="kenaliNomborQNum">1</span>/10
    </div>
    <div class="kenali-nombor-display">
      <div id="nomborVisual" class="nombor-visual"></div>
    </div>
    <div class="question-text" id="kenaliNomborQuestion">
      Berapa banyak benda di atas?
    </div>
    <div class="options">
      <div id="kenaliNomborOptions" class="option-buttons"></div>
    </div>
    <div id="kenaliNomborFeedback" class="feedback"></div>
  </div>
</div>




        <!-- Results Screen -->
        <div id="resultsScreen" class="menu-screen hidden">
            <div class="results-container">
                <h2>Keputusan Akhir</h2>
                <div id="resultContent"></div>
                <button class="menu-btn" onclick="backToMenu()" style="width: 200px;">🏠 Kembali ke Menu</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
